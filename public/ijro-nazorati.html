function statusStats(tasks){ const total=tasks.length; const done=tasks.filter(t=>isDone(t.status)).length; const progress=tasks.filter(t=>t.status==='Bajarilmoqda'||t.status==='Qabul qilindi').length; const overdue=tasks.filter(isOverdue).length; const failed=tasks.filter(t=>t.status==='Bajarilmadi').length; const fresh=tasks.filter(t=>t.status==='Yangi').length; return {total,done,progress,overdue,failed,fresh}; }
function groupedByType(tasks){ const map = new Map(); tasks.forEach(t=>{ const key=t.type||'Boshqa'; map.set(key,(map.get(key)||0)+1); }); return [...map.entries()].map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,5); }
function groupedByEmployee(tasks){ const map = new Map(); tasks.forEach(t=>{ const key=t.assigneeId||'none'; const label = byId(state.users,key)?.name || '-'; map.set(key,{label,value:(map.get(key)?.value||0)+1}); }); return [...map.values()].sort((a,b)=>b.value-a.value).slice(0,5); }
function chartBars(items,total){ if(!items.length) return '<div class="empty">Ma’lumot yo‘q.</div>'; return '<div class="mini-bars">'+items.map(item=>'<div class="mini-bar"><div class="row"><span>'+escapeHtml(item.label)+'</span><span class="mini-value">'+item.value+'</span></div><div class="bar-track"><div class="bar-fill" style="width:'+pct(item.value,total)+'%"></div></div></div>').join('')+'</div>'; }
function donutChart(tasks){ const s=statusStats(tasks); const total=Math.max(s.total,1); const segDone=pct(s.done,total), segProg=pct(s.progress,total), segOver=pct(s.overdue,total), segFail=pct(s.failed,total); const grad='conic-gradient(#14c97a 0 '+segDone+'%, #f5b942 '+segDone+'% '+(segDone+segProg)+'%, #ef5350 '+(segDone+segProg)+'% '+(segDone+segProg+segOver)+'%, #8b5cf6 '+(segDone+segProg+segOver)+'% '+(segDone+segProg+segOver+segFail)+'%, #93a4c5 '+(segDone+segProg+segOver+segFail)+'% 100%)'; return '<div class="donut-wrap"><div class="donut" style="background:'+grad+'"><div class="donut-center"><b>'+s.total+'</b><span>jami topshiriqlar</span></div></div><div class="legend"><div class="legend-item"><div class="legend-left"><span class="legend-dot" style="background:#14c97a"></span><span>Bajarilgan</span></div><b>'+s.done+'</b></div><div class="legend-item"><div class="legend-left"><span class="legend-dot" style="background:#f5b942"></span><span>Jarayonda</span></div><b>'+s.progress+'</b></div><div class="legend-item"><div class="legend-left"><span class="legend-dot" style="background:#ef5350"></span><span>Kechikkan</span></div><b>'+s.overdue+'</b></div><div class="legend-item"><div class="legend-left"><span class="legend-dot" style="background:#8b5cf6"></span><span>Bajarilmadi</span></div><b>'+s.failed+'</b></div><div class="legend-item"><div class="legend-left"><span class="legend-dot" style="background:#93a4c5"></span><span>Yangi</span></div><b>'+s.fresh+'</b></div></div></div>'; }
function tasksByUpcomingDays(tasks, days=7){
  const today = new Date();
  const labels=[]; const values=[];
  for(let i=0;i<days;i++){
    const d = new Date(today); d.setDate(today.getDate()+i);
    const iso = d.toISOString().slice(0,10);
    labels.push(iso.slice(5));
    values.push(tasks.filter(t=>t.deadline===iso).length);
  }
  return {labels, values};
}
function tasksByCompanies(tasks, limit=10){
  const map = new Map();
  tasks.forEach(t=>{
    const c = byId(state.companies,t.companyId) || {};
    const label = c.name || '-';
    const current = map.get(label) || { label, value:0 };
    current.value += 1;
    map.set(label,current);
  });
  return [...map.values()].sort((a,b)=>b.value-a.value || String(a.label).localeCompare(String(b.label))).slice(0,limit);
}
function employeePerformance(tasks, limit=10){
  const map = new Map();
  state.users.filter(u=>u.role==='employee').forEach(u=>map.set(u.id,{ id:u.id, label:u.name || '-', done:0, progress:0, overdue:0, total:0 }));
  tasks.forEach(t=>{
    const id = t.assigneeId || 'none';
    if(!map.has(id)) map.set(id,{ id, label: byId(state.users,id)?.name || 'Biriktirilmagan', done:0, progress:0, overdue:0, total:0 });
    const row = map.get(id);
    if(isOverdue(t)) row.overdue += 1;
    else if(isDone(t.status)) row.done += 1;
    else if(t.status !== 'Bekor qilindi' && t.status !== 'Bajarilmadi') row.progress += 1;
    row.total = row.done + row.progress + row.overdue;
  });
  return [...map.values()].filter(x=>x.total>0).sort((a,b)=>b.done-a.done || b.total-a.total || String(a.label).localeCompare(String(b.label))).slice(0,limit);
}
function svgLineChart(data){
  const width=520, height=220, pad=30, max=Math.max(...data.values,1);
  const step = data.values.length>1 ? (width-pad*2)/(data.values.length-1) : 0;
  const points = data.values.map((v,i)=>`${pad + i*step},${height-pad - (v/max)*(height-pad*2)}`).join(' ');
  const area = `M ${pad} ${height-pad} ` + data.values.map((v,i)=>`L ${pad + i*step} ${height-pad - (v/max)*(height-pad*2)}`).join(' ') + ` L ${width-pad} ${height-pad} Z`;
  const labels = data.labels.map((label,i)=>`<text x="${pad+i*step}" y="${height-8}" text-anchor="middle">${label}</text>`).join('');
  const dots = data.values.map((v,i)=>`<circle cx="${pad+i*step}" cy="${height-pad - (v/max)*(height-pad*2)}" r="4" />`).join('');
  const grid = [0,1,2,3,4].map(i=>{ const y = pad + i*(height-pad*2)/4; return `<line x1="${pad}" y1="${y}" x2="${width-pad}" y2="${y}" />`; }).join('');
  return `<svg viewBox="0 0 ${width} ${height}" class="chart-svg line-chart"><g class="grid">${grid}</g><path class="area" d="${area}"/><polyline class="line" points="${points}"/>${dots}<g class="labels">${labels}</g></svg>`;
}
function horizontalCompanyChart(items){
  if(!items.length) return '<div class="stage77-empty">Korxonalar bo‘yicha ma’lumot yo‘q.</div>';
  const max = Math.max(...items.map(x=>x.value),1);
  const total = items.reduce((s,x)=>s+x.value,0);
  return '<div class="hbar-chart">'+items.map(item=>{
    const w = Math.max(6, Math.round((item.value/max)*100));
    return `<div class="hbar-row" title="${escapeHtml(item.label)} — ${item.value} ta"><div class="hbar-label">${escapeHtml(item.label)}</div><div class="hbar-track"><div class="hbar-fill" style="width:${w}%"><span>${item.value}</span></div></div><div class="hbar-value">${item.value}</div></div>`;
  }).join('')+'</div><div class="chart-total-note">Top 10 korxona · jami '+total+' ta topshiriq</div>';
}
function stackedEmployeeChart(items){
  if(!items.length) return '<div class="stage77-empty">Xodimlar bo‘yicha ma’lumot yo‘q.</div>';
  return '<div class="stacked-chart">'+items.map(item=>{
    const total = Math.max(item.total,1);
    const doneW = item.done ? Math.max(7, Math.round(item.done/total*100)) : 0;
    const progressW = item.progress ? Math.max(7, Math.round(item.progress/total*100)) : 0;
    const overdueW = item.overdue ? Math.max(7, Math.round(item.overdue/total*100)) : 0;
    return `<div class="stack-row" title="${escapeHtml(item.label)} — Bajarilgan: ${item.done}, Jarayonda: ${item.progress}, Kechikkan: ${item.overdue}"><div class="stack-label">${escapeHtml(item.label)}<span class="stack-sub">Jami: ${item.total}</span></div><div class="stack-track">${item.done?`<span class="stack-seg done" style="width:${doneW}%"><em>${item.done}</em></span>`:''}${item.progress?`<span class="stack-seg progress" style="width:${progressW}%"><em>${item.progress}</em></span>`:''}${item.overdue?`<span class="stack-seg overdue" style="width:${overdueW}%"><em>${item.overdue}</em></span>`:''}</div></div>`;
  }).join('')+'</div>';
}
function analyticsSection(tasks){

  const companies = tasksByCompanies(tasks, 10);

async function api(path, options={}){
  const res = await fetch(API_BASE + path, { headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, ...options });
  const json = await res.json().catch(() => ({ ok:false, error:'Serverdan noto‘g‘ri javob keldi' }));
  if(!res.ok || json.ok === false) throw new Error(json.error || 'Server xatosi');
  return json;
}
async function apiForm(path, formData){
  const res = await fetch(API_BASE + path, { method:'POST', body: formData, headers: { 'Accept': 'application/json' } });
  const json = await res.json().catch(() => ({ ok:false, error:'Serverdan noto‘g‘ri javob keldi' }));
  if(!res.ok || json.ok === false) throw new Error(json.error || 'Server xatosi');
  return json;
}
const bootstrapCacheKey = 'ijro_bootstrap_cache_v7_1';
function saveBootstrapCache(){ try{ sessionStorage.setItem(bootstrapCacheKey, JSON.stringify({ time: Date.now(), data: state })); }catch(e){} }
function restoreBootstrapCache(){ try{ const raw=sessionStorage.getItem(bootstrapCacheKey); if(!raw) return false; const cached=JSON.parse(raw); if(!cached?.data?.tasks) return false; state=cached.data; return true; }catch(e){ return false; } }
async function loadData(){ const r = await api('/api/bootstrap'); state = r.data; saveBootstrapCache(); return state; }
async function refreshDataSilently(){ try{ await loadData(); const fresh=byId(state.users,currentUser?.id); if(fresh){ currentUser=fresh; sessionStorage.setItem('ijro_current_user', JSON.stringify(currentUser)); } render(); }catch(err){ console.warn('Background refresh failed:', err.message); } }
async function init(){
  if(!currentUser) return renderLogin();
  const hasCache = restoreBootstrapCache();
  if(hasCache){ const fresh = byId(state.users, currentUser.id); if(fresh){ currentUser = fresh; sessionStorage.setItem('ijro_current_user', JSON.stringify(currentUser)); } render(); refreshDataSilently(); return; }
  try { await loadData(); const fresh = byId(state.users, currentUser.id); if(!fresh || !fresh.isActive){ logout(false); return alert('Foydalanuvchi topilmadi yoki to‘xtatilgan'); } currentUser = fresh; sessionStorage.setItem('ijro_current_user', JSON.stringify(currentUser)); render(); }
  catch(err){ renderError(err.message); }
}

async function login(){
  const btn = $('loginBtn');
  const status = $('loginStatus');
  try{
    if(btn){ btn.disabled = true; btn.textContent = 'Kirilmoqda...'; }
    if(status) status.textContent = 'Login tekshirilmoqda...';
    const r = await api('/api/auth/login?bootstrap=false', { method:'POST', body: JSON.stringify({ login: $('login').value.trim(), password: $('password').value.trim() }) });
    currentUser = r.user;
    sessionStorage.setItem('ijro_current_user', JSON.stringify(currentUser));
    currentView = currentUser.role === 'employee' ? 'my' : 'companies';
    if(restoreBootstrapCache()){
      const fresh = byId(state.users, currentUser.id);
      if(fresh) currentUser = fresh;
      sessionStorage.setItem('ijro_current_user', JSON.stringify(currentUser));
      render();
      refreshDataSilently();
      return;
    }
    renderLoading('Kirish tasdiqlandi. Ma’lumotlar yuklanmoqda...');
    await loadData();
    const fresh = byId(state.users, currentUser.id);
    if(fresh) currentUser = fresh;
    sessionStorage.setItem('ijro_current_user', JSON.stringify(currentUser));
    render();
  }catch(err){
    alert(err.message);
    renderLogin();
  }
}

function sortKanbanTasks(tasks,key){
  if(key==='done' || key==='archive') return tasks.sort((a,b)=>String(taskApprovedAt(b)).localeCompare(String(taskApprovedAt(a))));
  return tasks.sort((a,b)=>String(a.deadline||'9999-12-31').localeCompare(String(b.deadline||'9999-12-31')) || String(a.createdAt||'').localeCompare(String(b.createdAt||'')));
}

function filterKanbanItems(items){
  let rows = items.slice();
  const q = String(kanbanFilters.query||'').trim().toLowerCase();
  if(q){ const parts=q.split(/\s+/).filter(Boolean); rows=rows.filter(t=>{ const hay=kanbanSearchText(t); return parts.every(part=>hay.includes(part)); }); }
  if(kanbanFilters.companyId) rows=rows.filter(t=>t.companyId===kanbanFilters.companyId);
  if(kanbanFilters.assigneeId) rows=rows.filter(t=>t.assigneeId===kanbanFilters.assigneeId);
  if(kanbanFilters.overdue==='true') rows=rows.filter(isOverdue);
  if(kanbanFilters.overdue==='false') rows=rows.filter(t=>!isOverdue(t));
  return rows;
}

function monthLabel(date){ return date.toLocaleDateString('uz-UZ',{month:'long', year:'numeric'}); }

function endOfMonth(date){ return new Date(date.getFullYear(), date.getMonth()+1, 0); }

function prevCalendarPeriod(){ if(currentCalendarMode==='month') currentCalendarDate = new Date(currentCalendarDate.getFullYear(), currentCalendarDate.getMonth()-1, 1); else { const d=new Date(currentCalendarDate); d.setDate(d.getDate()-7); currentCalendarDate=d; } render(); }

function renderMonthCalendar(){ const monthStart=startOfMonth(currentCalendarDate); const monthEnd=endOfMonth(currentCalendarDate); const firstDay=(monthStart.getDay()+6)%7; const totalDays=monthEnd.getDate(); const tasks=calendarScopedTasks().filter(t=>t.deadline); const taskMap={}; tasks.forEach(t=>{ const d=new Date(t.deadline); if(d.getFullYear()===currentCalendarDate.getFullYear() && d.getMonth()===currentCalendarDate.getMonth()){ const day=d.getDate(); (taskMap[day] ||= []).push(t); } }); let cells=''; const week=['Du','Se','Ch','Pa','Ju','Sh','Ya']; for(let i=0;i<week.length;i++) cells += `<div class="calendar-weekday">${week[i]}</div>`; for(let i=0;i<firstDay;i++) cells += `<div class="calendar-day muted-cell"></div>`; for(let day=1;day<=totalDays;day++){ const iso = new Date(currentCalendarDate.getFullYear(), currentCalendarDate.getMonth(), day).toISOString().slice(0,10); const isToday = new Date().toISOString().slice(0,10)===iso; const dayTasks=(taskMap[day]||[]).sort((a,b)=>String(a.deadline).localeCompare(String(b.deadline))); cells += `<div class="calendar-day ${isToday?'today':''}"><div class="calendar-date">${day}</div><div class="calendar-items">${dayTasks.map(t=>`<button class="calendar-task ${badgeClass(t.status,t)}" onclick="openCalendarTask('${t.id}')">${escapeHtml(getTaskTime(t) ? getTaskTime(t)+' · '+t.title : t.title)}</button>`).join('')}</div></div>`; } return `<div class="calendar-grid month-grid">${cells}</div>`; }

function calendarPeriodLabel(){ if(currentCalendarMode==='month') return monthLabel(currentCalendarDate); const s=startOfWeek(currentCalendarDate), e=endOfWeek(currentCalendarDate); return `${formatShortDate(s)} - ${formatShortDate(e)}`; }

function formatFileSize(bytes){
  const size = Number(bytes || 0);
  if(size < 1024) return size + ' B';
  if(size < 1024*1024) return (size/1024).toFixed(1) + ' KB';
  return (size/1024/1024).toFixed(1) + ' MB';
}
function fileIcon(name, type){
  const n = String(name || '').toLowerCase();
  const t = String(type || '').toLowerCase();
  if(t.startsWith('image/') || /\.(png|jpg|jpeg|gif|webp|bmp|svg)$/.test(n)) return '🖼️';
  if(t.includes('pdf') || n.endsWith('.pdf')) return '📄';
  if(/\.(doc|docx)$/.test(n)) return '📝';
  if(/\.(xls|xlsx|csv)$/.test(n)) return '📊';
  if(/\.(zip|rar|7z|tar|gz)$/.test(n)) return '🗜️';
  if(/\.(txt|rtf|log)$/.test(n)) return '📃';
  return '📎';
}
async function openAttachments(id){
  try{
    editingTaskId = id;
    const task = byId(state.tasks,id);

    const r = await api('/api/tasks/'+id+'/attachments');
    const rows = (r.data||[]).map(a=>`<tr><td style="font-size:20px">${fileIcon(a.fileName,a.fileType)}</td><td><b>${escapeHtml(a.fileName)}</b><br><span class="muted">${formatFileSize(a.fileSize)} · ${escapeHtml(a.uploadedByName || '')}</span></td><td>${formatDateTime(a.createdAt)}</td><td>${a.url?`<a class="btn secondary small" href="${escapeHtml(a.url)}" target="_blank" rel="noopener">Ochish</a>`:''} <button class="btn danger small" onclick="deleteAttachment('${a.id}')">O‘chirish</button></td></tr>`).join('');

async function uploadAttachment(){
  try{
    const input = $('attachmentFile');
    if(!input || !input.files || !input.files[0]) return alert('Fayl tanlang');
    const form = new FormData();
    form.append('file', input.files[0]);
    form.append('actorId', currentUser.id);
    await apiForm('/api/tasks/'+editingTaskId+'/attachments', form);
    await loadData();
    await openAttachments(editingTaskId);
  }catch(err){ alert(err.message); }
}
async function deleteAttachment(id){
  if(!confirm('Ilova o‘chirilsinmi?')) return;
  try{
    await api('/api/attachments/'+id+'?actorId='+encodeURIComponent(currentUser.id), { method:'DELETE' });
    await loadData();
    await openAttachments(editingTaskId);
  }catch(err){ alert(err.message); }
}


function inlineHistoryId(id){ return 'inline_history_' + String(id || '').replace(/[^a-zA-Z0-9_-]/g,'_'); }

}
function historyStatusLine(h){
  const oldStatus = h.old_status || '';
  const newStatus = h.new_status || '';
  if(!oldStatus && !newStatus) return '';
  return `<div class="history-status-line"><span class="badge gray">${escapeHtml(oldStatus || '-')}</span><span class="muted">→</span><span class="badge ${badgeClass(newStatus)}">${escapeHtml(newStatus || '-')}</span></div>`;
}
function renderHistoryCompactRows(rows){
  if(!rows || !rows.length) return '<div class="history-empty">Tarix ma’lumotlari topilmadi.</div>';
  return `<div class="history-list">${rows.map(h=>`<div class="history-item"><div class="history-item-top"><span class="history-action">${escapeHtml(h.action||'-')}</span><span class="history-date">${formatDateTime(h.created_at)}</span></div><div class="history-meta">Foydalanuvchi: <b>${escapeHtml(h.app_users?.full_name||'-')}</b></div>${historyStatusLine(h)}${h.note?`<div class="history-note">${escapeHtml(h.note)}</div>`:''}</div>`).join('')}</div>`;
}
async function loadInlineTaskHistory(id){
  const box = $(inlineHistoryId(id));
  if(!box) return;
  box.innerHTML = '<div class="history-loading">Tarix yuklanmoqda...</div>';
  try{
    const r = await api('/api/tasks/'+id+'/history');
    box.innerHTML = renderHistoryCompactRows(r.data || []);
  }catch(err){
    box.innerHTML = `<div class="history-empty">Tarixni yuklab bo‘lmadi: ${escapeHtml(err.message)}</div>`;
  }
}

  const companyField = companyPickerHtml(t, allowMultiple);
  const copyInfo = source ? `<div class="copy-badge">Nusxa · status Yangi · muddat bugungi sana</div>` : '';
  showModal(id?(t.isQuick?'Tezkor topshiriqni tahrirlash':'Topshiriqni tahrirlash'):(source?'Topshiriqni nusxalash':(quick?'Tezkor topshiriq yaratish':'Topshiriq qo‘shish')), `${copyInfo}<div class="form-grid">${companyField}<div><label>Mas’ul xodim</label><select id="m_assignee">${state.users.filter(u=>u.role==='employee'&&(u.isActive||u.id===t.assigneeId)).map(u=>`<option value="${u.id}" ${u.id===t.assigneeId?'selected':''}>${escapeHtml(u.name)}${u.isActive?'':' (to‘xtatilgan)'}</option>`).join('')}</select></div><div class="full"><label>Topshiriq spravochnigi</label><select id="m_template" onchange="applyTaskTemplate()"><option value="">Qo‘lda kiritish</option>${state.taskTemplates.filter(x=>x.isActive).map(x=>`<option value="${x.id}" ${x.id===t.templateId?'selected':''}>${escapeHtml(x.title)} — ${x.defaultDays} kun</option>`).join('')}</select></div><div class="full"><label>Topshiriq nomi</label><input id="m_title" value="${escapeHtml(t.title)}"></div><div><label>Turi</label><select id="m_type">${taskTypes.map(x=>`<option ${x===t.type?'selected':''}>${x}</option>`).join('')}</select></div><div><label>Muddat va soat</label><div class="time-inline"><input id="m_deadline" type="date" value="${escapeHtml(t.deadline||todayISO())}"><input id="m_deadline_time" type="time" value="${escapeHtml(taskTimeValue)}" title="Topshiriq soati"></div></div><div><label>Muhimlik</label><select id="m_priority">${priorities.map(x=>`<option ${x===t.priority?'selected':''}>${x}</option>`).join('')}</select></div><div><label>Status</label><select id="m_status">${statusList.map(x=>`<option ${x===t.status?'selected':''}>${x}</option>`).join('')}</select></div><div><label>Topshiriq holati</label>${boolSelect('m_active', t.isActive)}</div><div class="full"><label>Topshiriq mazmuni</label><textarea id="m_description">${escapeHtml(t.description||'')}</textarea></div><div class="full"><label>Direktor izohi</label><textarea id="m_directorNote">${escapeHtml(stripTaskTimeMarker(t.directorNote||''))}</textarea></div></div>${id?taskInlineHistoryBlock(id):''}<div class="actions">${id?'<button class="btn danger" onclick="deleteTask()">O‘chirish</button>':''}<button class="btn ghost" onclick="closeModal()">Bekor qilish</button><button class="btn" onclick="saveTask()">Saqlash</button></div>`);
  if(id) setTimeout(()=>loadInlineTaskHistory(id),0);
}
function applyTaskTemplate(){ const id=$('m_template').value; if(!id) return; const tpl=byId(state.taskTemplates,id); if(!tpl) return; $('m_title').value=tpl.title; $('m_type').value=tpl.type; $('m_priority').value=tpl.priority; $('m_description').value=tpl.description||''; $('m_deadline').value=addDaysISO(tpl.defaultDays); }
async function saveTask(){ try{ const companyIds=selectedModalCompanyIds(); const singleCompany=$('m_company')?.value || companyIds[0] || ''; if(!editingTaskId && !singleCompany && !companyIds.length) return alert('Kamida bitta korxona tanlang.'); const payload={templateId:$('m_template').value||null,companyId:singleCompany,companyIds:companyIds.length?companyIds:undefined,assigneeId:$('m_assignee').value,title:$('m_title').value,type:$('m_type').value,deadline:$('m_deadline').value,priority:$('m_priority').value,status:$('m_status').value,description:$('m_description').value,directorNote:withTaskTimeMarker($('m_directorNote').value, $('m_deadline_time')?.value || ''),isQuick:modalMode==='quick',isActive:$('m_active').value==='true',createdBy:currentUser.id,actorId:currentUser.id}; if(!editingTaskId && companyIds.length>1){ await api('/api/tasks/bulk',{method:'POST',body:JSON.stringify(payload)}); } else { await api(editingTaskId?'/api/tasks/'+editingTaskId:'/api/tasks',{method:editingTaskId?'PUT':'POST',body:JSON.stringify(payload)}); } await loadData(); closeModal(); render(); }catch(err){ alert(err.message); } }
function openEmployeeUpdate(id){ const t=byId(state.tasks,id); if(!t) return; editingTaskId=id; showModal('Topshiriq holatini belgilash', `<p><b>${escapeHtml(byId(state.companies,t.companyId)?.name||'-')}</b></p><h3 style="margin-top:0">${escapeHtml(t.title)}</h3><p style="color:var(--muted)">${escapeHtml(t.description||'')}</p><div class="form-grid"><div><label>Status</label><select id="e_status">${['Qabul qilindi','Bajarilmoqda','Bajarildi','Bajarilmadi'].map(x=>`<option ${x===t.status?'selected':''}>${x}</option>`).join('')}</select></div><div><label>Muddat</label><input value="${escapeHtml(t.deadline)}" disabled></div><div class="full"><label>Izoh</label><textarea id="e_note">${escapeHtml(t.employeeNote||'')}</textarea></div></div>${taskInlineHistoryBlock(id)}<div class="actions"><button class="btn ghost" onclick="closeModal()">Bekor qilish</button><button class="btn" onclick="saveEmployeeUpdate()">Saqlash</button></div>`); setTimeout(()=>loadInlineTaskHistory(id),0); }
async function saveEmployeeUpdate(){ try{ await api('/api/tasks/'+editingTaskId,{method:'PUT',body:JSON.stringify({status:$('e_status').value,employeeNote:$('e_note').value,actorId:currentUser.id})}); await loadData(); closeModal(); render(); }catch(err){ alert(err.message); } }
async function confirmTask(id){ try{ await api('/api/tasks/'+id+'/confirm',{method:'POST',body:JSON.stringify({actorId:currentUser.id,directorNote:'Tasdiqlandi.'})}); await loadData(); render(); }catch(err){ alert(err.message); } }
async function deleteTask(){ if(!confirm('Topshiriq o‘chirilsinmi?')) return; try{ await api('/api/tasks/'+editingTaskId,{method:'DELETE'}); await loadData(); closeModal(); render(); }catch(err){ alert(err.message); } }
function filterTable(tableId,q){ if(tableId==='companiesTable') updateCompanySearch(q); }
function filterTasks(){ applyTaskSearch(); updateTaskStatus($('statusFilter')?.value||''); }
document.addEventListener('keydown', e=>{ if(!currentUser && e.key==='Enter' && $('login') && $('password')) login(); });
init();
</script>
</body>
